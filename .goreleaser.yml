version: 2

builds:
  - main: ./cmd/cerebro
    binary: cerebro
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - arm64
      - amd64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
    hooks:
      post:
        - codesign -s - -f "{{ .Path }}"

archives:
  - formats:
      - tar.gz

checksum:
  name_template: checksums.txt

homebrew_casks:
  - repository:
      owner: coetzeevs
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/coetzeevs/cerebro
    description: Local-first persistent memory system for AI agents
    binaries:
      - cerebro
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/cerebro"]
